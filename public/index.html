<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QLab Screen</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="server-offline">
    <main class="shell">
      <section class="connection-panel" aria-label="QLab connection">
        <div>
          <p class="eyebrow">QLab Screen</p>
          <h1 id="workspaceHero">Waiting for workspace</h1>
        </div>
        <nav class="page-links" aria-label="Pages">
          <a href="/admin.html">Admin</a>
          <a href="/dashboard.html">TV Dashboard</a>
        </nav>
      </section>

      <section class="status-strip" aria-live="polite">
        <div>
          <span class="label">Status</span>
          <strong id="statusText">Disconnected</strong>
        </div>
        <div>
          <span class="label">Current Group</span>
          <strong id="workspaceText">-</strong>
        </div>
        <div>
          <span class="label">Running</span>
          <strong id="runningCount">0</strong>
        </div>
        <div>
          <span class="label">Last update</span>
          <strong id="lastUpdate">-</strong>
        </div>
      </section>

      <section class="mobile-glance" aria-label="At a glance">
        <div class="glance-top">
          <span id="mobileStatus">Disconnected</span>
          <span id="mobileLastUpdate">-</span>
        </div>
        <div class="glance-group">
          <span class="label">Current Group</span>
          <strong id="mobileGroup">-</strong>
        </div>
        <div class="glance-cue">
          <span id="mobileCueNumber">-</span>
          <strong id="mobileCueName">No cue running</strong>
        </div>
        <div class="glance-progress" aria-hidden="true">
          <span id="mobileProgress"></span>
        </div>
        <div class="glance-times">
          <span id="mobileElapsed">--:--.- elapsed</span>
          <span id="mobileRemaining">--:--.- remaining</span>
        </div>
        <div class="glance-bottom">
          <span id="mobileRunningCount">0 running</span>
          <span id="mobileWorkspace">No workspace</span>
        </div>
      </section>

      <section class="boards">
        <div class="panel">
          <div class="panel-head">
            <h2>Cue Order</h2>
            <span id="cueCount">0 cues</span>
          </div>
          <div id="cueList" class="cue-list empty">No cues loaded.</div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>Running Now</h2>
            <span>live timing</span>
          </div>
          <div id="runningList" class="running-list empty">Nothing running.</div>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
