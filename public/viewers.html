    <title>QLab Screen Viewers</title>

  </head>
  <body>
    <main class="shell admin-shell">
      <section class="connection-panel" aria-label="Viewer connections">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>Live viewers</h1>

        <nav class="page-links" aria-label="Pages">

    <script src="/viewers.js" type="module"></script>
